services:

  traefik:
    image: traefik:v3.3
    command:
      - --log.level=INFO
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dashboard.rule=Host(`traefik.localhost`)
      - traefik.http.routers.traefik-dashboard.service=api@internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: signage
      POSTGRES_USER: signage
      POSTGRES_PASSWORD: signage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signage"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_files:/app/media
    env_file: backend/.env
    environment:
      DATABASE_URL: postgres://signage:signage@postgres:5432/signage
      MEDIA_ROOT: /app/media/
      ALLOWED_HOSTS: "signage.localhost,localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://signage.localhost"
      CSRF_TRUSTED_ORIGINS: "http://signage.localhost"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.backend.rule=Host(`signage.localhost`) && (PathPrefix(`/api`) || PathPrefix(`/media/uploads`) || PathPrefix(`/admin`) || PathPrefix(`/player`) || PathPrefix(`/static`))"
      - traefik.http.routers.backend.priority=10
      - traefik.http.services.backend.loadbalancer.server.port=8000

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Tells Vite's HMR client to connect back through Traefik (port 80)
      HMR_HOST: signage.localhost
      HMR_PORT: "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`signage.localhost`)
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=5173

volumes:
  postgres_data:
  media_files:
