<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ device.name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #slide { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #slide img, #slide video { width: 100%; height: 100%; object-fit: contain; }
    #offline-badge {
      position: fixed; bottom: 12px; right: 12px;
      background: rgba(0,0,0,.6); color: #f59e0b;
      font: 11px/1 sans-serif; padding: 4px 8px; border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="slide"></div>
  <div id="offline-badge">● offline</div>

  <script>
  (function () {
    const DEVICE_KEY    = "{{ device_key }}";
    const SYNC_URL      = "{{ sync_url }}";
    const HEARTBEAT_URL = "{{ heartbeat_url }}";
    const PLAY_URL      = "{{ play_url }}";
    const SYNC_INTERVAL    = 60_000;   // re-sync every 60 s when online
    const HEARTBEAT_INTERVAL = 30_000;
    const SCHEDULE_CHECK    = 60_000;  // re-evaluate schedule every 60 s

    let syncData   = null;
    let slideTimer = null;
    let currentItems = [];
    let currentIdx   = 0;
    let isOnline = navigator.onLine;

    // ── offline badge ───────────────────────────────────────────────
    const badge = document.getElementById('offline-badge');
    window.addEventListener('online',  () => { isOnline = true;  badge.style.display = 'none'; });
    window.addEventListener('offline', () => { isOnline = false; badge.style.display = 'block'; });

    // ── service worker ──────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/player/' }).catch(() => {});
    }

    // ── analytics buffer ────────────────────────────────────────────
    const EVENTS_KEY = 'signage_play_events_' + DEVICE_KEY;

    function bufferEvent(mediaId, playlistId, durationSeconds) {
      try {
        const buf = JSON.parse(localStorage.getItem(EVENTS_KEY) || '[]');
        buf.push({ media_id: mediaId, playlist_id: playlistId || null,
                   duration_seconds: durationSeconds, ts: Date.now() });
        // Keep at most 500 events to avoid filling storage
        localStorage.setItem(EVENTS_KEY, JSON.stringify(buf.slice(-500)));
      } catch {}
    }

    async function flushEvents() {
      try {
        const raw = localStorage.getItem(EVENTS_KEY);
        if (!raw) return;
        const events = JSON.parse(raw);
        if (!events.length) return;
        const res = await fetch(PLAY_URL, {
          method: 'POST',
          headers: { 'X-Device-Key': DEVICE_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ events }),
        });
        if (res.ok) localStorage.removeItem(EVENTS_KEY);
      } catch {}
    }

    // ── screen on/off evaluation ────────────────────────────────────
    function isDisplayOn(data) {
      const sched = data && data.screen_schedule;
      if (!sched || !sched.on || !sched.off) return true;
      const { hhmm } = zonedDayAndTime(sched.tz || 'UTC');
      const cur    = parseInt(hhmm.slice(0,2)) * 60 + parseInt(hhmm.slice(3,5));
      const onMin  = parseInt(sched.on.slice(0,2))  * 60 + parseInt(sched.on.slice(3,5));
      const offMin = parseInt(sched.off.slice(0,2)) * 60 + parseInt(sched.off.slice(3,5));
      if (onMin <= offMin) return cur >= onMin && cur < offMin;
      return cur >= onMin || cur < offMin; // overnight window
    }

    function showBlack() {
      clearTimeout(slideTimer);
      slideTimer = null;
      document.getElementById('slide').innerHTML = '';
    }

    // ── schedule evaluation ─────────────────────────────────────────
    function zonedDayAndTime(tz) {
      const now = new Date();
      try {
        const fmt = new Intl.DateTimeFormat('en-US', {
          timeZone: tz, weekday: 'short',
          hour: '2-digit', minute: '2-digit', hour12: false,
        });
        const parts = fmt.formatToParts(now);
        const get = type => (parts.find(p => p.type === type) || {}).value || '';
        const hhmm = get('hour').padStart(2, '0') + ':' + get('minute').padStart(2, '0');
        const day  = { Sun:6, Mon:0, Tue:1, Wed:2, Thu:3, Fri:4, Sat:5 }[get('weekday')]
                     ?? (now.getDay() + 6) % 7;
        return { hhmm, day };
      } catch {
        return { hhmm: now.toTimeString().slice(0, 5), day: (now.getDay() + 6) % 7 };
      }
    }

    function getActiveItems(data) {
      if (!data) return [];
      const { hhmm, day } = zonedDayAndTime(data.timezone || 'UTC');

      const matching = (data.schedules || [])
        .filter(s => s.days.includes(day) && s.start <= hhmm && s.end > hhmm)
        .sort((a, b) => b.priority - a.priority);

      return (matching[0]?.items ?? data.default_items ?? []);
    }

    // ── media caching via SW ────────────────────────────────────────
    function cacheMediaUrls(items) {
      if (!navigator.serviceWorker.controller) return;
      const urls = items.map(i => i.url);
      navigator.serviceWorker.controller.postMessage({ type: 'CACHE_MEDIA', urls });
    }

    // ── slideshow ───────────────────────────────────────────────────
    function showItem(idx) {
      if (!currentItems.length) return;
      const item  = currentItems[idx % currentItems.length];
      const slide = document.getElementById('slide');
      slide.innerHTML = '';

      const startedAt = Date.now();

      if (item.type === 'image') {
        const img = document.createElement('img');
        img.src = item.url;
        slide.appendChild(img);
        slideTimer = setTimeout(() => {
          bufferEvent(item.media_id, item.playlist_id, Math.round((Date.now() - startedAt) / 1000));
          advance();
        }, item.duration * 1000);
      } else {
        const video = document.createElement('video');
        video.src = item.url;
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        slide.appendChild(video);
        const timeout = setTimeout(() => {
          bufferEvent(item.media_id, item.playlist_id, Math.round((Date.now() - startedAt) / 1000));
          advance();
        }, item.duration * 1000);
        video.addEventListener('ended', () => {
          clearTimeout(timeout);
          bufferEvent(item.media_id, item.playlist_id, Math.round((Date.now() - startedAt) / 1000));
          advance();
        });
      }
    }

    function advance() {
      currentIdx = (currentIdx + 1) % (currentItems.length || 1);
      showItem(currentIdx);
    }

    function applyItems(items) {
      if (!items.length) return;
      // Only reset if the playlist actually changed
      const newSig = items.map(i => i.media_id + ':' + i.duration).join(',');
      const oldSig = currentItems.map(i => i.media_id + ':' + i.duration).join(',');
      if (newSig === oldSig) return;
      clearTimeout(slideTimer);
      currentItems = items;
      currentIdx   = 0;
      showItem(0);
    }

    // ── sync ────────────────────────────────────────────────────────
    const SYNC_KEY    = 'signage_sync_' + DEVICE_KEY;
    const VERSION_KEY = 'signage_ver_'  + DEVICE_KEY;

    async function doSync() {
      try {
        const res = await fetch(SYNC_URL, {
          headers: { 'X-Device-Key': DEVICE_KEY },
        });
        if (!res.ok) return;
        const data = await res.json();
        syncData = data;
        localStorage.setItem(SYNC_KEY, JSON.stringify(data));
        localStorage.setItem(VERSION_KEY, String(data.version));

        // Pre-cache ALL media referenced in this device's schedules + default
        const allItems = [
          ...(data.default_items || []),
          ...(data.schedules || []).flatMap(s => s.items),
        ];
        const unique = [...new Map(allItems.map(i => [i.url, i])).values()];
        cacheMediaUrls(unique);
      } catch {}
    }

    async function heartbeat() {
      try {
        const res = await fetch(HEARTBEAT_URL, {
          method: 'POST',
          headers: { 'X-Device-Key': DEVICE_KEY },
        });
        if (!res.ok) return;
        await flushEvents();
      } catch {}
    }

    // ── schedule re-evaluation loop ─────────────────────────────────
    function reschedule() {
      if (!isDisplayOn(syncData)) { showBlack(); return; }
      const items = getActiveItems(syncData);
      applyItems(items.length ? items : currentItems);
    }

    // ── boot ────────────────────────────────────────────────────────
    async function boot() {
      // Load cached sync data immediately (works offline)
      const cached = localStorage.getItem(SYNC_KEY);
      if (cached) {
        try {
          syncData = JSON.parse(cached);
          if (!isDisplayOn(syncData)) {
            showBlack();
          } else {
            const items = getActiveItems(syncData);
            applyItems(items.length ? items : (syncData.default_items || []));
          }
        } catch {}
      }

      // Attempt a fresh sync (may fail if offline — that's fine)
      await doSync();
      if (!isDisplayOn(syncData)) {
        showBlack();
      } else {
        const items = getActiveItems(syncData);
        if (items.length) applyItems(items);
      }

      setInterval(doSync,     SYNC_INTERVAL);
      setInterval(heartbeat,  HEARTBEAT_INTERVAL);
      setInterval(reschedule, SCHEDULE_CHECK);

      heartbeat();
    }

    boot();
  })();
  </script>
</body>
</html>
