<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ device.name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111; display: flex; align-items: center; justify-content: center; }
    p { color: #555; font-family: sans-serif; font-size: 1.2rem; }
  </style>
</head>
<body>
  <p>No playlist assigned to this device.</p>
  <script>
    // Reload every 60 s in case a playlist gets assigned
    setTimeout(() => window.location.reload(), 60000);
  </script>
</body>
</html>
